<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/to-do-app-vite/favicon.ico" />
    <title>Todo app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100..700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/to-do-app-vite/assets/index-sR7a-a4B.js"></script>
    <link rel="stylesheet" crossorigin href="/to-do-app-vite/assets/index-DwObfhH8.css">
  </head>
  <body>
    <main>
      <div class="container">
        <header class="heading">
          <h1 class="heading-title">TODO</h1>
          <button class="heading-theme-btn" id="theme-toggle" aria-label="Toggle dark mode"></button>
        </header>
        <form id="form" class="input-form">
          <button class="input-form-add-btn" type="button" id="btn-add-task" aria-label="Add task"></button>
          <input
            id="todo-input"
            class="input-form-field"
            type="text"
            placeholder="Create a new todo..."
          />
        </form>

        <ul class="todo-list" id="todo-list"></ul>

        <div class="status-bar">
          <p class="status-bar-count"><span id="score" aria-live="polite"></span></p>
          <div class="status-bar-filters">
            <button class="filter-btn filter-btn-active" type="button" id="all">All</button>
            <button class="filter-btn" type="button" id="active">Active</button>
            <button class="filter-btn" type="button" id="completed">Completed</button>
          </div>
          <button class="status-bar-clear-btn" type="button" id="clear-btn">Clear Completed</button>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p class="footer-drag-hint">Drag and drop to reorder list</p>
      <p class="footer-attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>.
        Coded by <a href="https://curlycoder.ca">Olga Borodchak</a>.
      </p>
    </footer>
  </body>
</html>
